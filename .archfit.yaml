# Generated by archfit init — TODO: review and promote gate: warn to gate: fail
version: 1

# Minimum severity for BC coupling advisories: low|medium|high|critical
bc_advisory_min_severity: medium

python_package: ccgram

tools:
  scip:
    enabled: "on"
  go:
    enabled: "off"
  python:
    enabled: "on"
  typescript:
    enabled: "off"

layers:
  - core
  - adapter

modules:
  # --- Adapter: subpackages ---
  handlers:
    paths:
      - "ccgram.handlers"
      - "ccgram.handlers.*"
    layer: adapter
  providers:
    paths:
      - "ccgram.providers"
      - "ccgram.providers.*"
    layer: adapter

  # --- Core: subpackages ---
  hooks:
    paths:
      - "ccgram.hooks"
      - "ccgram.hooks.*"
    layer: core
  llm:
    paths:
      - "ccgram.llm"
      - "ccgram.llm.*"
    layer: core
  miniapp:
    paths:
      - "ccgram.miniapp"
      - "ccgram.miniapp.*"
    layer: core
  tts:
    paths:
      - "ccgram.tts"
      - "ccgram.tts.*"
    layer: core
  whisper:
    paths:
      - "ccgram.whisper"
      - "ccgram.whisper.*"
    layer: core
  window_state_ports:
    paths:
      - "ccgram.window_state_ports"
      - "ccgram.window_state_ports.*"
    layer: core

  # --- Core: session and lifecycle management ---
  session_state:
    paths:
      - "ccgram.session"
      - "ccgram.session_map"
      - "ccgram.session_lifecycle"
      - "ccgram.session_resolver"
      - "ccgram.session_query"
      - "ccgram.session_monitor"
      - "ccgram.topic_state_registry"
      - "ccgram.claude_task_state"
      - "ccgram.idle_tracker"
      - "ccgram.state_persistence"
      - "ccgram.monitor_events"
      - "ccgram.monitor_state"
    layer: core

  # --- Core: window state and queries ---
  window_state:
    paths:
      - "ccgram.window_query"
      - "ccgram.window_resolver"
      - "ccgram.window_state_store"
      - "ccgram.window_view"
    layer: core

  # --- Core: transcript reading and terminal parsing ---
  transcript:
    paths:
      - "ccgram.transcript_parser"
      - "ccgram.transcript_reader"
      - "ccgram.event_reader"
      - "ccgram.terminal_parser"
      - "ccgram.screen_buffer"
      - "ccgram.last_unit"
    layer: core

  # --- Core: config, shared utilities, and domain formatting ---
  domain_config:
    paths:
      - "ccgram"
      - "ccgram._version"
      - "ccgram.config"
      - "ccgram.user_preferences"
      - "ccgram.toolbar_config"
      - "ccgram.command_catalog"
      - "ccgram.utils"
      - "ccgram.expandable_quote"
      - "ccgram.tool_format"
    layer: core

  # --- Adapter: Telegram protocol and bot ---
  telegram_adapter:
    paths:
      - "ccgram.telegram_client"
      - "ccgram.telegram_draft"
      - "ccgram.telegram_request"
      - "ccgram.telegram_sender"
      - "ccgram.bot"
      - "ccgram.cc_commands"
      - "ccgram.entity_formatting"
    layer: adapter

  # --- Adapter: tmux and terminal infrastructure ---
  tmux_adapter:
    paths:
      - "ccgram.tmux_manager"
      - "ccgram.thread_router"
      - "ccgram.screenshot"
    layer: adapter

  # --- Adapter: application entry points and CLI ---
  app_bootstrap:
    paths:
      - "ccgram.main"
      - "ccgram.cli"
      - "ccgram.bootstrap"
      - "ccgram.doctor_cmd"
      - "ccgram.status_cmd"
      - "ccgram.hook"
    layer: adapter

rules:
  - id: no-forbidden-deps
    type: forbidden_dependency
    gate: fail
  - id: no-import-cycles
    type: cycle
    gate: fail
