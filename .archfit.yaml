# archfit architecture-drift config for ccgram.
#
# Design notes (2026-06-27 review + design):
# - VOLATILITY is the coupling lever, not owner. Measured: declaring
#   subdomain+volatility moved mean book balance 2.9 -> 6.0 and critical edges
#   387 -> 62. Declaring `owner` left distance unchanged (archfit distance is
#   code_structure-based).
# - `owner: alexei-led` is declared on every module for hygiene (single owner;
#   silences omit-owner warnings) — NOT to influence coupling. See the
#   solo-developer note below: a single owner adds zero ownership distance.
# - Subdomain/volatility are architect-inferred (core=differentiator/high,
#   supporting=needed/medium, generic=solved-problem/low). Treat as labels to
#   confirm; tune against how each area actually churns.
# - The boundary rules are the enforced drift gate (gate: fail; they pass today).
#   The pytest audits (test_multiplexer_boundary, test_no_tty_*,
#   test_query_layer_*) remain the in-process truth; archfit is the fast pre-push
#   + CI mirror.
# - no-import-cycles is gate: warn ON PURPOSE. archfit's SCIP graph counts
#   in-function (lazy) imports as cycle edges; ccgram breaks load-time cycles
#   with a deliberate lazy-import contract (lint_lazy_imports + the
#   clean-interpreter test_import_no_cycles, the real runtime gate). Keep the
#   archfit cycle signal visible, but do not let it block.
#
# Solo-developer / distance note (Balanced Coupling):
#   Distance is socio-technical — different-TEAM ownership RAISES it. A single
#   owner adds ZERO ownership distance, so here distance reduces to code
#   structure + runtime. Declaring yourself as owner is correct and honest, but
#   it cannot lower coupling: the only levers are reduce strength (add a
#   contract), reduce structural distance (co-locate), or accept low volatility.
#   Because you personally absorb every cascade, honest `volatility` is the right
#   primary signal — it tells you which couplings will actually bite.
version: 1
python_package: ccgram
# Minimum severity for BC coupling advisories: low|medium|high|critical
bc_advisory_min_severity: medium
# Inferred-volatility cascade (Balanced Coupling, book Ch9; archfit >=0.8). A
# stable module that is functional/intrusive-coupled to a `core` module inherits
# high volatility — it gets dragged into change whenever the core does. This is
# exactly ccgram's shape: modules wired to the live-session core (session_state,
# handlers, window_state) co-evolve with it. Enabling this surfaces that inherited
# volatility instead of under-rating quiet modules wired to a churning core.
volatility_cascade_enabled: true
# Skip non-Python assets from extraction (incl. the jscpd clone scan). Without
# this, font-license text + miniapp JS dominate clone findings as false cohesion
# risk. .gitnexus/.codegraph index dirs are auto-ignored by archfit.
exclusions:
  - '**/fonts/**'
  - '**/miniapp/static/**'
  - '**/pkg/mod/**' # stray Go module cache at repo root (untracked cruft; safe to `rm -rf pkg/`)
tools:
  scip:
    enabled: "on"
  go:
    enabled: "off"
  python:
    enabled: "on"
  typescript:
    enabled: "off"
  syntax:
    enabled: "on"
  complexity:
    enabled: "on" # lizard — powers complexity hotspots (e.g. parse_entries CCN 72)
  clones:
    enabled: "on" # jscpd — powers duplication signal (kept honest by exclusions)
  llm:
    provider: anthropic
    model: claude-opus-4-8
layers:
  - core
  - adapter
modules:
  # --- Adapter: subpackages ---
  handlers:
    paths:
      - ccgram.handlers
      - ccgram.handlers.*
    layer: adapter
    owner: alexei-led
    subdomain: core # the orchestration that makes ccgram ccgram
    volatility: high
  providers:
    paths:
      - ccgram.providers
      - ccgram.providers.*
    layer: adapter
    owner: alexei-led
    subdomain: supporting # adapters to external agent CLIs
    volatility: medium
  # --- Core: subpackages ---
  hooks:
    paths:
      - ccgram.hooks
      - ccgram.hooks.*
    layer: core
    owner: alexei-led
    subdomain: supporting
    volatility: low
  llm:
    paths:
      - ccgram.llm
      - ccgram.llm.*
    layer: core
    owner: alexei-led
    subdomain: generic # LLM client plumbing
    volatility: low
  miniapp:
    paths:
      - ccgram.miniapp
      - ccgram.miniapp.*
    layer: core
    owner: alexei-led
    subdomain: supporting
    volatility: medium
  tts:
    paths:
      - ccgram.tts
      - ccgram.tts.*
    layer: core
    owner: alexei-led
    subdomain: generic
    volatility: low
  whisper:
    paths:
      - ccgram.whisper
      - ccgram.whisper.*
    layer: core
    owner: alexei-led
    subdomain: generic
    volatility: low
  window_state_ports:
    paths:
      - ccgram.window_state_ports
      - ccgram.window_state_ports.*
    layer: core
    owner: alexei-led
    subdomain: core
    volatility: medium
  # --- Core: session and lifecycle management (the live-session core) ---
  # Highest-fan-in volatile target cluster from the review (claude_task_state,
  # session, session_monitor, monitor_state). The 62 residual critical edges
  # land here — the genuine coupling hotspot, candidate for a read-contract.
  session_state:
    paths:
      - ccgram.session
      - ccgram.session_map
      - ccgram.session_lifecycle
      - ccgram.session_resolver
      - ccgram.session_query
      - ccgram.session_monitor
      - ccgram.topic_state_registry
      - ccgram.claude_task_state
      - ccgram.idle_tracker
      - ccgram.state_persistence
      - ccgram.monitor_events
      - ccgram.monitor_state
      - ccgram.event_stream_monitor # supervises multiplexer.watch_events → agent_status_cache / death
    layer: core
    owner: alexei-led
    subdomain: core
    volatility: high
  # --- Core: window state and queries ---
  window_state:
    paths:
      - ccgram.window_query
      - ccgram.window_resolver
      - ccgram.window_state_store
      - ccgram.window_view
    layer: core
    owner: alexei-led
    subdomain: core
    volatility: medium
  # --- Core: transcript reading and terminal parsing ---
  transcript:
    paths:
      - ccgram.transcript_parser
      - ccgram.transcript_reader
      - ccgram.event_reader
      - ccgram.terminal_parser
      - ccgram.screen_buffer
      - ccgram.last_unit
    layer: core
    owner: alexei-led
    subdomain: supporting # follows external transcript formats
    volatility: medium
  # --- Core: config, shared utilities, and domain formatting ---
  domain_config:
    paths:
      - ccgram
      - ccgram._version
      - ccgram.config
      - ccgram.user_preferences
      - ccgram.toolbar_config
      - ccgram.command_catalog
      - ccgram.utils
      - ccgram.expandable_quote
      - ccgram.tool_format
    layer: core
    owner: alexei-led
    subdomain: generic # stable shared infra (config fan-in ~72)
    volatility: low
  # --- Adapter: Telegram protocol and bot ---
  telegram_adapter:
    paths:
      - ccgram.telegram_client
      - ccgram.telegram_draft
      - ccgram.telegram_request
      - ccgram.telegram_sender
      - ccgram.bot
      - ccgram.cc_commands
      - ccgram.entity_formatting
    layer: adapter
    owner: alexei-led
    subdomain: supporting
    volatility: medium
  # --- Core: multiplexer contract (pure Protocol + value types) ---
  # The backend-neutral seam callers depend on. Generic subdomain; functional
  # volatility low, implementation volatility medium (one backend became two;
  # herdr is young). The public boundary is this module — callers import
  # `ccgram.multiplexer` (proxy) / `ccgram.multiplexer.base` and the neutral
  # helpers, never a concrete backend. `base` importing no backend is the F3
  # core-purity audit (test_import_no_cycles); the proxy's wiring import of
  # `registry` is the seam's sanctioned job (F1 exempts `multiplexer/**`).
  multiplexer:
    paths:
      - ccgram.multiplexer # proxy facade (neutral)
      - ccgram.multiplexer.base # Protocol + capabilities + value types
      - ccgram.multiplexer.vim_state
      - ccgram.multiplexer.window_ops
      - ccgram.multiplexer.self_identify
      - ccgram.multiplexer.agent_status_cache # backend-neutral push-status cache (mirrors vim_state)
      - ccgram.multiplexer.topic_mapping # backend-neutral window→topic projection helper
    layer: core
    owner: alexei-led
    subdomain: generic
    volatility: low # functional; implementation medium (two backends)
  # --- Adapter: concrete multiplexer backends (private internals) ---
  # tmux/herdr socket + JSON shapes stay quarantined here. No caller may import
  # these — enforced by the F1 pytest audit (test_multiplexer_boundary) and by
  # the no-*-to-mux-backends rules below. These backends also own the
  # foreground/tty internals: the tmux backend is the only sanctioned home for
  # `pane_tty` reads + `ps -t`, exposed solely through `Multiplexer.foreground()`.
  # That no-tty boundary is enforced by tests/ccgram/test_no_tty_outside_backend.py.
  multiplexer_backends:
    paths:
      - ccgram.multiplexer.tmux
      - ccgram.multiplexer.herdr
      - ccgram.multiplexer.herdr_events # herdr-only unix-socket event-stream reader
      - ccgram.multiplexer.registry
    layer: adapter
    owner: alexei-led
    subdomain: generic
    volatility: medium # implementation: herdr protocol / id scheme may change
  # --- Adapter: provider-detection classifier (foreground -> provider name) ---
  # The backend-neutral half of foreground detection. `process_detection` only
  # classifies a neutral `ForegroundInfo.argv` it receives from
  # `Multiplexer.foreground()` — no tty, no `ps`. The sanctioned consumer is the
  # providers facade (`detect_provider_from_pane`); handlers must route through
  # that facade, not import the classifier internals (no-tty drift gate below).
  provider_detection:
    paths:
      - ccgram.providers.process_detection
    layer: adapter
    owner: alexei-led
    subdomain: generic
    volatility: low
  # --- Adapter: terminal infrastructure ---
  terminal_adapter:
    paths:
      - ccgram.thread_router
      - ccgram.screenshot
    layer: adapter
    owner: alexei-led
    subdomain: supporting
    volatility: low
  # --- Adapter: application entry points and CLI ---
  app_bootstrap:
    paths:
      - ccgram.main
      - ccgram.cli
      - ccgram.bootstrap
      - ccgram.doctor_cmd
      - ccgram.status_cmd
      - ccgram.hook
    layer: adapter
    owner: alexei-led
    subdomain: generic # composition root / wiring
    volatility: low
rules:
  # IMPORTANT — forbidden_dependency `from`/`to` are PATH GLOBS (e.g.
  # `ccgram.handlers**`), NOT module-group names. Using a module name (`handlers`)
  # silently matches nothing and the rule never fires (verified, archfit 0.10).
  # The pytest test_multiplexer_boundary audit stays the COMPREHENSIVE in-process
  # gate (all callers, both import forms, allow-list); these glob rules mirror the
  # highest-risk source->backend edges as a fast archfit drift signal.
  #
  # Multiplexer seam: no caller may import a concrete backend (tmux/herdr/registry);
  # callers go through the neutral `ccgram.multiplexer` proxy / `.base` contract.
  - id: no-handlers-to-tmux
    type: forbidden_dependency
    from: ccgram.handlers**
    to: ccgram.multiplexer.tmux
    gate: fail
  - id: no-handlers-to-herdr
    type: forbidden_dependency
    from: ccgram.handlers**
    to: ccgram.multiplexer.herdr
    gate: fail
  - id: no-handlers-to-mux-registry
    type: forbidden_dependency
    from: ccgram.handlers**
    to: ccgram.multiplexer.registry
    gate: fail
  - id: no-providers-to-tmux
    type: forbidden_dependency
    from: ccgram.providers**
    to: ccgram.multiplexer.tmux
    gate: fail
  - id: no-providers-to-herdr
    type: forbidden_dependency
    from: ccgram.providers**
    to: ccgram.multiplexer.herdr
    gate: fail
  # No-tty drift gate: handlers learn the foreground process through the
  # `detect_provider_from_pane` facade, never by importing the classifier
  # directly. Mirrors the pytest test_no_tty_outside_backend audit.
  - id: no-handlers-to-provider-detection
    type: forbidden_dependency
    from: ccgram.handlers**
    to: ccgram.providers.process_detection
    gate: fail
  # Advisory (see header): archfit counts lazy/in-function imports as cycle
  # edges; the runtime gate is the clean-interpreter test_import_no_cycles.
  - id: no-import-cycles
    type: cycle
    gate: warn
